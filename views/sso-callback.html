<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSO 登录中 - LLM Wiki</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-msg {
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
        }
        .back-link {
            color: #3b82f6;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loadingSection">
            <div class="spinner"></div>
            <h2>正在登录...</h2>
            <p style="color: #6b7280;">请稍候，正在验证您的企业账号</p>
        </div>
        <div id="errorSection" style="display:none">
            <h2 style="color: #dc2626;">登录失败</h2>
            <div id="errorMsg" class="error-msg" style="display:block"></div>
            <a href="/login.html" class="back-link">返回登录</a>
        </div>
    </div>
    <script>
        // SSO 回调页面 — 服务端已通过 302 重定向处理
        // 如果到达此页面，说明回调失败
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');

        if (error) {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('errorSection').style.display = 'block';
            document.getElementById('errorMsg').textContent = decodeURIComponent(error);
        } else {
            // 如果没有错误参数但到达此页面，重定向到首页
            window.location.href = '/';
        }
    </script>
</body>
</html>
