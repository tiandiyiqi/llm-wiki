<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线编辑 - LLM Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #f7fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        .btn-secondary:hover { background: #cbd5e0; }
        .btn-success { background: #38a169; color: white; }
        .btn-success:hover { background: #2f855a; }
        .input { width: 100%; padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 14px; }
        .input:focus { outline: none; border-color: #667eea; }
        .editor-area { font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 14px; line-height: 1.6; }
        .preview-area { font-size: 14px; line-height: 1.6; }
        .preview-area h1 { font-size: 1.8em; font-weight: 700; margin: 0.6em 0 0.4em; }
        .preview-area h2 { font-size: 1.5em; font-weight: 600; margin: 0.6em 0 0.4em; }
        .preview-area h3 { font-size: 1.2em; font-weight: 600; margin: 0.6em 0 0.4em; }
        .preview-area p { margin: 0.5em 0; }
        .preview-area code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .preview-area pre { background: #f1f5f9; padding: 12px; border-radius: 6px; overflow-x: auto; }
        .preview-area ul, .preview-area ol { padding-left: 1.5em; margin: 0.5em 0; }
        .tag-pill { display: inline-block; padding: 2px 8px; background: #ebf8ff; color: #2b6cb0; border-radius: 12px; font-size: 12px; margin-right: 4px; }
    </style>
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-wrap gap-2 items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="text-gray-600 hover:text-gray-800">← 返回首页</a>
                <h1 class="text-xl font-bold text-gray-800" id="pageTitle">新建原子</h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="/admin/upload.html" class="text-sm text-blue-600 hover:underline">文件上传</a>
                <span class="text-sm text-gray-600">当前: <strong id="currentUserName">-</strong></span>
                <button onclick="API.logout()" class="btn btn-secondary">退出</button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-6">
        <!-- 元信息表单 -->
        <div class="card p-6 mb-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">标题 *</label>
                    <input type="text" id="atomTitle" class="input" placeholder="原子标题">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">类型</label>
                    <select id="atomType" class="input">
                        <option value="fact">fact（事实）</option>
                        <option value="method">method（方法）</option>
                        <option value="definition">definition（定义）</option>
                        <option value="opinion">opinion（观点）</option>
                        <option value="data">data（数据）</option>
                        <option value="question">question（问题）</option>
                        <option value="reference">reference（参考）</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">标签（逗号分隔）</label>
                    <input type="text" id="atomTags" class="input" placeholder="标签1, 标签2">
                </div>
            </div>
        </div>

        <!-- 编辑器 + 预览 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="card p-4">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-medium text-gray-700">Markdown 编辑器</h2>
                    <div class="flex flex-wrap gap-1">
                        <button onclick="insertText('**', '**', '粗体')" class="btn btn-secondary text-xs px-2 py-1">B</button>
                        <button onclick="insertText('*', '*', '斜体')" class="btn btn-secondary text-xs px-2 py-1">I</button>
                        <button onclick="insertText('## ', '', '标题')" class="btn btn-secondary text-xs px-2 py-1">H</button>
                        <button onclick="insertText('- ', '', '列表项')" class="btn btn-secondary text-xs px-2 py-1">•</button>
                        <button onclick="insertText('[', '](url)', '链接')" class="btn btn-secondary text-xs px-2 py-1">🔗</button>
                        <button onclick="insertText('```\n', '\n```', '代码块')" class="btn btn-secondary text-xs px-2 py-1">{ }</button>
                    </div>
                </div>
                <textarea id="editor" class="input editor-area" rows="20" placeholder="在此输入 Markdown 内容..." oninput="updatePreview()"># 标题

在这里输入内容...</textarea>
            </div>
            <div class="card p-4">
                <h2 class="text-sm font-medium text-gray-700 mb-2">实时预览</h2>
                <div id="preview" class="preview-area prose max-w-none"></div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="flex flex-wrap gap-2 mt-4">
            <button onclick="saveAtom()" class="btn btn-success">保存原子</button>
            <button onclick="saveAndPublish()" class="btn btn-primary">保存并发布</button>
            <button onclick="loadAtom()" class="btn btn-secondary">加载已有原子</button>
            <a href="/" class="btn btn-secondary">取消</a>
        </div>

        <!-- 加载原子的弹窗 -->
        <div id="loadModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-xl p-6 w-full max-w-md modal-fullscreen-mobile">
                <h3 class="text-lg font-bold mb-4">加载已有原子</h3>
                <div class="space-y-3">
                    <input type="text" id="loadAtomId" class="input" placeholder="原子 ID 或路径（如 atoms/facts/xxx）">
                    <button onclick="doLoadAtom()" class="btn btn-primary w-full">加载</button>
                </div>
                <button onclick="document.getElementById('loadModal').classList.add('hidden')" class="btn btn-secondary w-full mt-2">取消</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * API 封装
         */
        const API = {
            currentUser: null,
            async init() {
                try {
                    const r = await fetch('/api/auth/whoami', { credentials: 'same-origin' });
                    const d = await r.json();
                    if (d.user) {
                        this.currentUser = d.user;
                        document.getElementById('currentUserName').textContent = d.user.username;
                        return true;
                    }
                } catch (e) {}
                window.location.href = '/login.html';
                return false;
            },
            async get(url) {
                const r = await fetch(url, { credentials: 'same-origin' });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                return r.json();
            },
            async post(url, data) {
                const r = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data || {}),
                    credentials: 'same-origin',
                });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                return r.json();
            },
            async put(url, data) {
                const r = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data || {}),
                    credentials: 'same-origin',
                });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                return r.json();
            },
            async logout() {
                await this.post('/api/auth/logout').catch(() => {});
                window.location.href = '/login.html';
            },
            isEditor() { return this.currentUser && ['editor', 'admin'].includes(this.currentUser.role); }
        };

        let currentAtomId = null;

        /**
         * 初始化
         */
        async function init() {
            const ok = await API.init();
            if (!ok) return;
            if (!API.isEditor()) {
                alert('仅 editor/admin 可访问编辑器');
                window.location.href = '/';
                return;
            }
            // 检查 URL 参数，是否有要编辑的原子 ID
            const params = new URLSearchParams(window.location.search);
            const atomId = params.get('id');
            if (atomId) {
                currentAtomId = atomId;
                await doLoadAtomById(atomId);
            }
            updatePreview();
        }

        /**
         * 更新预览
         */
        function updatePreview() {
            const text = document.getElementById('editor').value;
            document.getElementById('preview').innerHTML = marked.parse(text);
        }

        /**
         * 插入文本
         */
        function insertText(prefix, suffix, placeholder) {
            const editor = document.getElementById('editor');
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selected = editor.value.substring(start, end) || placeholder;
            const newText = prefix + selected + suffix;
            editor.value = editor.value.substring(0, start) + newText + editor.value.substring(end);
            editor.focus();
            editor.selectionStart = start + prefix.length;
            editor.selectionEnd = start + prefix.length + selected.length;
            updatePreview();
        }

        /**
         * 保存原子
         */
        async function saveAtom(publish = false) {
            const title = document.getElementById('atomTitle').value.trim();
            const type = document.getElementById('atomType').value;
            const tagsStr = document.getElementById('atomTags').value.trim();
            const body = document.getElementById('editor').value;
            if (!title) { alert('请输入标题'); return; }
            if (!body.trim()) { alert('请输入内容'); return; }
            const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];
            try {
                let result;
                if (currentAtomId) {
                    // 更新已有原子
                    result = await API.put(`/api/atoms/${encodeURIComponent(currentAtomId)}`, { body, title, tags });
                } else {
                    // 创建新原子
                    result = await API.post('/api/atoms', { type, title, body, tags });
                    if (result.status === 'ok' && result.id) {
                        currentAtomId = result.id;
                    }
                }
                if (result.status === 'ok') {
                    if (publish && currentAtomId) {
                        await API.post(`/api/atoms/${encodeURIComponent(currentAtomId)}/publish`);
                        alert('已保存并发布');
                    } else {
                        alert('保存成功');
                    }
                    document.getElementById('pageTitle').textContent = `编辑: ${title}`;
                } else {
                    alert('保存失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        function saveAndPublish() { saveAtom(true); }

        /**
         * 显示加载弹窗
         */
        function loadAtom() {
            document.getElementById('loadModal').classList.remove('hidden');
            document.getElementById('loadModal').classList.add('flex');
        }

        /**
         * 执行加载
         */
        async function doLoadAtom() {
            const id = document.getElementById('loadAtomId').value.trim();
            if (!id) { alert('请输入原子 ID'); return; }
            await doLoadAtomById(id);
            document.getElementById('loadModal').classList.add('hidden');
            document.getElementById('loadModal').classList.remove('flex');
        }

        /**
         * 根据ID加载原子
         */
        async function doLoadAtomById(id) {
            try {
                const data = await API.get(`/api/atoms/${encodeURIComponent(id)}`);
                if (data.error) { alert(data.error); return; }
                currentAtomId = id;
                // 填充表单
                const fm = data.frontmatter || {};
                document.getElementById('atomTitle').value = fm.title || '';
                document.getElementById('atomType').value = fm.type || 'fact';
                document.getElementById('atomTags').value = (fm.tags || []).join(', ');
                // 提取 body（去掉 frontmatter）
                let body = data.body || data.content || '';
                document.getElementById('editor').value = body.trim();
                document.getElementById('pageTitle').textContent = `编辑: ${fm.title || id}`;
                updatePreview();
            } catch (e) {
                alert('加载失败: ' + e.message);
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
