<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享外链管理 - LLM Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f7fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        .btn-secondary:hover { background: #cbd5e0; }
        .btn-danger { background: #f56565; color: white; }
        .btn-danger:hover { background: #e53e3e; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal { background: white; border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw; }
        input, select { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        label { display: block; font-size: 13px; color: #4a5568; margin-bottom: 4px; font-weight: 500; }
        .status-active { background: #dcfce7; color: #15803d; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .status-revoked { background: #fee2e2; color: #b91c1c; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .status-expired { background: #fef3c7; color: #b45309; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="min-h-screen">
    <!-- PLAN-M-012：旧版页面迁移提示 -->
    <div style="background:#fffbeb;border-bottom:1px solid #fde68a;color:#92400e;padding:10px 16px;font-size:14px;text-align:center;line-height:1.6;" role="alert">
        ⚠️ 此页面为旧版，相关功能已迁移至新版主界面。
        <a href="../index.html#shares" style="color:#2563eb;font-weight:600;text-decoration:underline;margin-left:6px;">前往新版 →</a>
    </div>
    <header class="bg-white shadow-sm">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-2 text-sm">
            <div class="flex items-center gap-4">
                <a href="/" class="text-gray-600 hover:text-gray-800">← 返回首页</a>
                <h1 class="text-xl font-bold text-gray-800">分享外链管理</h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-600">当前: <strong id="currentUserName">-</strong></span>
                <button onclick="API.logout()" class="btn btn-secondary">退出</button>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-6 py-6">
        <!-- 介绍 -->
        <div class="card p-4 mb-6 bg-purple-50 border-l-4 border-purple-500">
            <h3 class="font-semibold text-purple-800 mb-1">🔗 加密外链分享</h3>
            <p class="text-sm text-purple-700">生成加密分享链接，支持有效期、密码保护、访问次数限制。链接可一键回收。</p>
        </div>

        <!-- 创建分享 -->
        <div class="card p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">创建分享链接</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label>原子 ID 或路径</label>
                    <input type="text" id="atomId" placeholder="例如：atoms/facts/测试原子">
                </div>
                <div>
                    <label>有效期（天，0=永久）</label>
                    <input type="number" id="expiresInDays" value="7" min="0" max="365">
                </div>
                <div>
                    <label>访问密码（可选）</label>
                    <input type="text" id="password" placeholder="留空表示无需密码">
                </div>
                <div>
                    <label>最大访问次数（0=不限）</label>
                    <input type="number" id="maxViews" value="0" min="0">
                </div>
            </div>
            <div class="mt-4">
                <button onclick="createShare()" class="btn btn-primary">生成分享链接</button>
            </div>
            <div id="shareResult" class="mt-4 hidden">
                <div class="bg-green-50 border border-green-200 rounded p-3">
                    <div class="text-sm text-green-800 font-medium mb-1">✅ 分享链接已生成</div>
                    <div class="flex items-center gap-2">
                        <input type="text" id="shareUrl" readonly class="flex-1 bg-white px-3 py-2 border rounded text-sm font-mono">
                        <button onclick="copyShareUrl()" class="btn btn-secondary text-xs">复制</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 分享链接列表 -->
        <div class="card p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-800">已创建的分享链接</h2>
                <button onclick="loadLinks()" class="btn btn-secondary text-sm">刷新</button>
            </div>
            <div id="linksList" class="space-y-3">
                <div class="text-center text-gray-500 py-8">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        const API = {
            currentUser: null,
            async init() {
                try {
                    const r = await fetch('/api/auth/whoami', { credentials: 'same-origin' });
                    const d = await r.json();
                    if (d.user) {
                        this.currentUser = d.user;
                        document.getElementById('currentUserName').textContent = d.user.username;
                        return true;
                    }
                } catch (e) {}
                window.location.href = '/login.html';
                return false;
            },
            async get(url) {
                const r = await fetch(url, { credentials: 'same-origin' });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                return r.json();
            },
            async post(url, data) {
                const r = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data || {}),
                    credentials: 'same-origin',
                });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                return r.json();
            },
            async delete(url) {
                const r = await fetch(url, { method: 'DELETE', credentials: 'same-origin' });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                return r.json();
            },
            async logout() {
                await this.post('/api/auth/logout').catch(() => {});
                window.location.href = '/login.html';
            }
        };

        async function createShare() {
            const atom_id = document.getElementById('atomId').value.trim();
            const expires_in_days = parseInt(document.getElementById('expiresInDays').value) || 7;
            const password = document.getElementById('password').value.trim() || null;
            const max_views = parseInt(document.getElementById('maxViews').value) || 0;
            if (!atom_id) {
                alert('请输入原子 ID');
                return;
            }
            try {
                const data = await API.post('/api/share', { atom_id, expires_in_days, password, max_views });
                if (data.status === 'ok' && data.link) {
                    const fullUrl = window.location.origin + data.link.url;
                    document.getElementById('shareUrl').value = fullUrl;
                    document.getElementById('shareResult').classList.remove('hidden');
                    await loadLinks();
                } else {
                    alert('创建失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('创建失败: ' + e.message);
            }
        }

        function copyShareUrl() {
            const input = document.getElementById('shareUrl');
            input.select();
            document.execCommand('copy');
            alert('链接已复制到剪贴板');
        }

        async function loadLinks() {
            try {
                const data = await API.get('/api/share');
                renderLinks(data.links || []);
            } catch (e) {
                document.getElementById('linksList').innerHTML = `<div class="text-red-500">加载失败: ${e.message}</div>`;
            }
        }

        function renderLinks(links) {
            const container = document.getElementById('linksList');
            if (links.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">暂无分享链接</div>';
                return;
            }
            container.innerHTML = links.map(l => {
                let status = 'active';
                let statusText = '启用';
                if (!l.active) {
                    status = 'revoked';
                    statusText = '已回收';
                } else if (l.expires_at) {
                    try {
                        if (new Date(l.expires_at) < new Date()) {
                            status = 'expired';
                            statusText = '已过期';
                        }
                    } catch (e) {}
                }
                const fullUrl = window.location.origin + (l.url || `/share.html?token=${l.token}`);
                return `
                <div class="border border-gray-200 rounded-lg p-4">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <strong class="text-gray-800 text-sm">${escapeHtml(l.atom_id)}</strong>
                            <span class="status-${status}">${statusText}</span>
                            ${l.password ? '<span class="text-xs text-gray-500">🔒 密码保护</span>' : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyLink('${escapeHtml(fullUrl)}')" class="btn btn-secondary text-xs">复制链接</button>
                            ${l.active ? `<button onclick="revokeLink('${l.token}')" class="btn btn-danger text-xs">回收</button>` : ''}
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 mb-1">链接: ${escapeHtml(fullUrl)}</div>
                    <div class="text-xs text-gray-500">
                        创建: ${formatDate(l.created_at)}
                        · 过期: ${l.expires_at ? formatDate(l.expires_at) : '永久'}
                        · 访问: ${l.views || 0}${l.max_views > 0 ? '/' + l.max_views : '（不限）'}
                    </div>
                </div>
                `;
            }).join('');
        }

        function copyLink(url) {
            const input = document.createElement('textarea');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            alert('链接已复制');
        }

        async function revokeLink(token) {
            if (!confirm('确认回收此分享链接？回收后无法恢复。')) return;
            try {
                await API.delete(`/api/share/${token}`);
                await loadLinks();
            } catch (e) {
                alert('回收失败: ' + e.message);
            }
        }

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str).replace(/[&<>"']/g, m => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[m]));
        }

        function formatDate(iso) {
            if (!iso) return '-';
            try {
                return new Date(iso).toLocaleString('zh-CN');
            } catch (e) {
                return iso;
            }
        }

        async function init() {
            const ok = await API.init();
            if (!ok) return;
            await loadLinks();
        }

        init();
    </script>
</body>
</html>
