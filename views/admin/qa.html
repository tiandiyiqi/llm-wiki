<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 问答 - LLM Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #f7fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        .btn-secondary:hover { background: #cbd5e0; }
        .chat-container { max-height: calc(100vh - 320px); overflow-y: auto; }
        .msg-user { background: #667eea; color: white; padding: 12px 16px; border-radius: 12px 12px 4px 12px; max-width: 80%; margin-left: auto; }
        .msg-bot { background: white; color: #2d3748; padding: 12px 16px; border-radius: 12px 12px 12px 4px; max-width: 80%; border: 1px solid #e2e8f0; }
        .msg-bot h1, .msg-bot h2, .msg-bot h3 { font-weight: 600; margin: 0.5em 0; }
        .msg-bot code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .msg-bot pre { background: #f1f5f9; padding: 12px; border-radius: 6px; overflow-x: auto; }
        .msg-bot ul, .msg-bot ol { padding-left: 1.5em; margin: 0.5em 0; }
        .source-card { background: #f7fafc; border-left: 3px solid #667eea; padding: 8px 12px; margin-top: 8px; border-radius: 4px; font-size: 13px; }
        .typing { display: inline-block; width: 8px; height: 14px; background: #667eea; animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .suggestion-chip { display: inline-block; padding: 4px 12px; background: #ebf8ff; color: #2b6cb0; border-radius: 16px; font-size: 13px; cursor: pointer; margin: 4px; transition: all 0.2s; }
        .suggestion-chip:hover { background: #bee3f8; }
        .history-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .history-item:hover { background: #f7fafc; }
        .mode-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
        .mode-retrieval { background: #f3f4f6; color: #374151; }
        .mode-llm { background: #dbeafe; color: #1d4ed8; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-white shadow-sm">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="text-gray-600 hover:text-gray-800">← 返回首页</a>
                <h1 class="text-xl font-bold text-gray-800">AI 知识问答</h1>
                <span id="modeIndicator" class="mode-badge mode-retrieval">检索模式</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showLLMConfig()" class="btn btn-secondary text-sm">⚙️ LLM 配置</button>
                <button onclick="clearHistory()" class="btn btn-secondary text-sm">清空历史</button>
                <a href="/admin/dashboard.html" class="text-sm text-blue-600 hover:underline">看板</a>
                <span class="text-sm text-gray-600">当前: <strong id="currentUserName">-</strong></span>
                <button onclick="API.logout()" class="btn btn-secondary">退出</button>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-6 py-6">
        <div class="grid grid-cols-4 gap-4">
            <!-- 左侧：历史对话 -->
            <div class="col-span-1">
                <div class="card p-4">
                    <h3 class="text-sm font-semibold text-gray-700 mb-3">💬 对话历史</h3>
                    <div id="historyList" class="space-y-1 text-sm">
                        <div class="text-gray-400 text-xs">暂无历史</div>
                    </div>
                </div>
            </div>

            <!-- 右侧：聊天区 -->
            <div class="col-span-3">
                <div class="card p-6">
                    <!-- 聊天区 -->
                    <div id="chatContainer" class="chat-container space-y-4 mb-4">
                        <div class="msg-bot">
                            <p>👋 你好！我是知识库问答助手，支持<strong>多轮对话</strong>。我会记住你之前的问题，可以基于上下文继续追问。</p>
                            <p class="mt-2 text-sm text-gray-500">试试以下问题：</p>
                            <div class="mt-2">
                                <span class="suggestion-chip" onclick="askSuggestion('最近有什么新内容？')">最近有什么新内容？</span>
                                <span class="suggestion-chip" onclick="askSuggestion('知识库中有哪些类型？')">知识库中有哪些类型？</span>
                                <span class="suggestion-chip" onclick="askSuggestion('总结一下知识库内容')">总结一下知识库内容</span>
                            </div>
                            <p class="mt-3 text-xs text-gray-400">💡 提示：配置 LLM API 后可获得更智能的回答（点击右上角"LLM 配置"）</p>
                        </div>
                    </div>

                    <!-- 输入区 -->
                    <div class="border-t border-gray-200 pt-4">
                        <div class="flex items-center space-x-2">
                            <input type="text" id="questionInput" class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-400"
                                placeholder="输入你的问题，支持多轮对话..." onkeydown="if(event.key==='Enter')askQuestion()">
                            <button onclick="askQuestion()" class="btn btn-primary px-6">发送</button>
                        </div>
                        <p class="text-xs text-gray-400 mt-2">💡 系统会记住最近 10 轮对话。无 LLM 时使用检索模式，配置 LLM 后获得更智能回答。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- LLM 配置弹窗 -->
    <div id="llmModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl p-6 w-96 max-w-90vw">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">⚙️ LLM API 配置</h3>
            <p class="text-sm text-gray-500 mb-4">配置后可使用 LLM 生成更智能的回答。配置信息仅保存在浏览器本地。</p>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API Base URL</label>
                    <input type="text" id="llmBaseUrl" placeholder="https://api.openai.com/v1" class="w-full px-3 py-2 border rounded text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                    <input type="password" id="llmApiKey" placeholder="sk-..." class="w-full px-3 py-2 border rounded text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">模型名称</label>
                    <input type="text" id="llmModel" placeholder="gpt-3.5-turbo" class="w-full px-3 py-2 border rounded text-sm">
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button onclick="hideLLMConfig()" class="btn btn-secondary">取消</button>
                <button onclick="saveLLMConfig()" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API = {
            currentUser: null,
            async init() {
                try {
                    const r = await fetch('/api/auth/whoami', { credentials: 'same-origin' });
                    const d = await r.json();
                    if (d.user) {
                        this.currentUser = d.user;
                        document.getElementById('currentUserName').textContent = d.user.username;
                        return true;
                    }
                } catch (e) {}
                window.location.href = '/login.html';
                return false;
            },
            async get(url) {
                const r = await fetch(url, { credentials: 'same-origin' });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                return r.json();
            },
            async post(url, data) {
                const r = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data || {}),
                    credentials: 'same-origin',
                });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                return r.json();
            },
            async logout() {
                await this.post('/api/auth/logout').catch(() => {});
                window.location.href = '/login.html';
            }
        };

        // LLM 配置（保存在 localStorage）
        let llmConfig = null;
        try {
            const saved = localStorage.getItem('llm-wiki-llm-config');
            if (saved) llmConfig = JSON.parse(saved);
        } catch (e) {}

        /**
         * 初始化
         */
        async function init() {
            const ok = await API.init();
            if (!ok) return;
            updateModeIndicator();
            await loadHistory();
        }

        /**
         * 更新模式指示器
         */
        function updateModeIndicator() {
            const indicator = document.getElementById('modeIndicator');
            if (llmConfig && llmConfig.api_key) {
                indicator.textContent = 'LLM 模式';
                indicator.className = 'mode-badge mode-llm';
            } else {
                indicator.textContent = '检索模式';
                indicator.className = 'mode-badge mode-retrieval';
            }
        }

        /**
         * 加载历史对话
         */
        async function loadHistory() {
            try {
                const data = await API.get('/api/qa/history');
                const history = data.history || [];
                const container = document.getElementById('historyList');
                if (history.length === 0) {
                    container.innerHTML = '<div class="text-gray-400 text-xs">暂无历史</div>';
                    return;
                }
                container.innerHTML = history.slice(-10).reverse().map((h, i) => `
                    <div class="history-item" onclick="loadHistoryItem(${history.length - 1 - (history.length - 10) + i})">
                        <div class="text-xs text-gray-700 truncate">${escapeHtml(h.q)}</div>
                        <div class="text-xs text-gray-400">${formatDate(h.timestamp)}</div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载历史失败:', e);
            }
        }

        /**
         * 添加消息到聊天区
         */
        function addMessage(content, isUser = false, sources = null, mode = null) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = isUser ? 'msg-user' : 'msg-bot';
            if (isUser) {
                div.textContent = content;
            } else {
                div.innerHTML = marked.parse(content);
                // 模式标签
                if (mode) {
                    const modeBadge = document.createElement('div');
                    modeBadge.className = 'mt-2 text-xs text-gray-400';
                    modeBadge.textContent = `模式: ${mode === 'llm' ? 'LLM 生成' : '检索'}`;
                    div.appendChild(modeBadge);
                }
                if (sources && sources.length > 0) {
                    const sourcesDiv = document.createElement('div');
                    sourcesDiv.className = 'mt-3';
                    sourcesDiv.innerHTML = '<p class="text-xs text-gray-500 mb-1">📚 参考来源：</p>';
                    for (const s of sources.slice(0, 3)) {
                        const card = document.createElement('div');
                        card.className = 'source-card';
                        card.innerHTML = `<strong>${escapeHtml(s.title || s.id || '-')}</strong> <span class="text-gray-500">(${escapeHtml(s.type || '')})</span> - <a href="/?atom=${encodeURIComponent(s.id || '')}" class="text-blue-600 hover:underline">查看详情</a>`;
                        sourcesDiv.appendChild(card);
                    }
                    div.appendChild(sourcesDiv);
                }
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        /**
         * 显示"正在思考"
         */
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'msg-bot';
            div.id = 'typingIndicator';
            div.innerHTML = '正在思考<span class="typing"></span>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        /**
         * 移除"正在思考"
         */
        function removeTyping() {
            const t = document.getElementById('typingIndicator');
            if (t) t.remove();
        }

        /**
         * 提问
         */
        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const q = input.value.trim();
            if (!q) return;
            input.value = '';
            addMessage(q, true);
            showTyping();
            try {
                // 调用问答 API（支持多轮对话）
                const data = await API.post('/api/qa/ask', {
                    question: q,
                    llm_config: llmConfig
                });
                removeTyping();
                if (data.error) {
                    addMessage(`**查询失败**: ${data.error}`);
                } else {
                    addMessage(data.answer || '未获得回答', false, data.sources, data.mode);
                }
                await loadHistory();
            } catch (e) {
                removeTyping();
                addMessage(`查询失败: ${e.message}`);
            }
        }

        /**
         * 点击建议问题
         */
        function askSuggestion(q) {
            document.getElementById('questionInput').value = q;
            askQuestion();
        }

        /**
         * 清空历史
         */
        async function clearHistory() {
            if (!confirm('确认清空所有对话历史？')) return;
            try {
                await API.post('/api/qa/clear');
                document.getElementById('chatContainer').innerHTML = `
                    <div class="msg-bot">
                        <p>✅ 对话历史已清空。开始新的对话吧！</p>
                    </div>
                `;
                await loadHistory();
            } catch (e) {
                alert('清空失败: ' + e.message);
            }
        }

        /**
         * 显示 LLM 配置弹窗
         */
        function showLLMConfig() {
            if (llmConfig) {
                document.getElementById('llmBaseUrl').value = llmConfig.base_url || '';
                document.getElementById('llmApiKey').value = llmConfig.api_key || '';
                document.getElementById('llmModel').value = llmConfig.model || '';
            }
            document.getElementById('llmModal').classList.remove('hidden');
        }

        function hideLLMConfig() {
            document.getElementById('llmModal').classList.add('hidden');
        }

        /**
         * 保存 LLM 配置
         */
        function saveLLMConfig() {
            const base_url = document.getElementById('llmBaseUrl').value.trim();
            const api_key = document.getElementById('llmApiKey').value.trim();
            const model = document.getElementById('llmModel').value.trim();
            if (api_key) {
                llmConfig = {
                    base_url: base_url || 'https://api.openai.com/v1',
                    api_key,
                    model: model || 'gpt-3.5-turbo'
                };
                localStorage.setItem('llm-wiki-llm-config', JSON.stringify(llmConfig));
            } else {
                llmConfig = null;
                localStorage.removeItem('llm-wiki-llm-config');
            }
            updateModeIndicator();
            hideLLMConfig();
            alert(llmConfig ? 'LLM 配置已保存' : '已切换为检索模式');
        }

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str).replace(/[&<>"']/g, m => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[m]));
        }

        function formatDate(iso) {
            if (!iso) return '';
            try {
                const d = new Date(iso);
                return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
            } catch (e) {
                return '';
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
