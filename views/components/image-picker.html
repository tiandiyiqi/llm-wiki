<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像选择器 - LLM Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/views/css/responsive.css">
    <style>
        body { background: #f7fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        .btn-secondary:hover { background: #cbd5e0; }
        .input { width: 100%; padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 14px; }
        .input:focus { outline: none; border-color: #667eea; }

        /* 弹窗遮罩 */
        .picker-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .picker-modal {
            background: white; border-radius: 16px; width: 720px; max-width: 90vw;
            max-height: 80vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .picker-header {
            padding: 16px 20px; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .picker-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .picker-footer {
            padding: 12px 20px; border-top: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: flex-end; gap: 8px;
        }

        /* 搜索框 */
        .picker-search {
            width: 100%; padding: 10px 14px 10px 36px;
            border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px;
            transition: border-color 0.2s;
        }
        .picker-search:focus { outline: none; border-color: #667eea; }
        .picker-search-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: #a0aec0; pointer-events: none;
        }

        /* 格式筛选标签 */
        .filter-tag {
            padding: 4px 12px; border-radius: 20px; font-size: 12px;
            cursor: pointer; transition: all 0.2s; border: 1px solid #e2e8f0;
            background: white; color: #4a5568;
        }
        .filter-tag:hover { border-color: #667eea; color: #667eea; }
        .filter-tag.active { background: #667eea; color: white; border-color: #667eea; }

        /* 图像网格 */
        .image-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; margin-top: 12px;
        }
        @media (min-width: 640px) { .image-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .image-grid { grid-template-columns: repeat(4, 1fr); } }

        /* 缩略图卡片 */
        .thumb-card {
            border: 2px solid #e2e8f0; border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: all 0.2s; background: white;
        }
        .thumb-card:hover { border-color: #a3bffa; box-shadow: 0 2px 8px rgba(102,126,234,0.15); }
        .thumb-card.selected { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.3); }
        .thumb-preview {
            width: 100%; height: 120px; object-fit: cover;
            background: #f7fafc; display: block;
        }
        .thumb-name {
            padding: 6px 8px; font-size: 11px; color: #4a5568;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* 加载与空状态 */
        .picker-loading { text-align: center; padding: 40px; color: #a0aec0; }
        .picker-empty { text-align: center; padding: 40px; color: #a0aec0; }
        .picker-error { text-align: center; padding: 20px; color: #e53e3e; font-size: 14px; }

        /* 分页 */
        .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
        .page-btn {
            padding: 4px 12px; border-radius: 6px; font-size: 13px;
            cursor: pointer; border: 1px solid #e2e8f0; background: white; color: #4a5568;
            transition: all 0.2s;
        }
        .page-btn:hover { border-color: #667eea; color: #667eea; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info { font-size: 13px; color: #718096; }
    </style>
</head>
<body>
    <!-- 弹窗容器 -->
    <div id="imagePickerOverlay" class="picker-overlay" style="display:none;">
        <div class="picker-modal modal-fullscreen-mobile">
            <div class="picker-header">
                <h2 class="text-lg font-bold text-gray-800">选择图像</h2>
                <button onclick="ImagePicker.close()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
            </div>
            <div class="picker-body">
                <!-- 搜索框 -->
                <div class="relative mb-3">
                    <span class="picker-search-icon">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </span>
                    <input type="text" id="pickerSearchInput" class="picker-search"
                        placeholder="搜索图像名称..." onkeydown="if(event.key==='Enter')ImagePicker.search()">
                </div>
                <!-- 格式筛选 -->
                <div class="flex flex-wrap gap-2 mb-2" id="pickerFilterTags"></div>
                <!-- 图像网格 -->
                <div id="pickerImageGrid" class="image-grid"></div>
                <!-- 状态提示 -->
                <div id="pickerStatus" class="picker-loading" style="display:none;"></div>
                <!-- 分页 -->
                <div id="pickerPagination" class="pagination" style="display:none;"></div>
            </div>
            <div class="picker-footer">
                <span id="pickerSelectedInfo" class="text-sm text-gray-500 mr-auto"></span>
                <button onclick="ImagePicker.close()" class="btn btn-secondary touch-target">取消</button>
                <button onclick="ImagePicker.confirm()" id="pickerConfirmBtn" class="btn btn-primary touch-target" disabled>插入图像</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * 图像选择器组件
         * 暴露全局方法: ImagePicker.open(callback, options), ImagePicker.close()
         */
        const ImagePicker = (function () {
            const FILTER_OPTIONS = ['全部', 'JPEG', 'PNG', 'WebP', 'GIF'];
            const PAGE_SIZE = 20;

            let _state = createInitialState();

            /** 创建初始状态（不可变模式） */
            function createInitialState() {
                return Object.freeze({
                    isOpen: false,
                    atomId: '',
                    search: '',
                    formatFilter: '全部',
                    page: 1,
                    images: [],
                    total: 0,
                    selectedId: null,
                    callback: null,
                    loading: false,
                    error: null
                });
            }

            /** 更新状态（不可变模式，返回新对象） */
            function setState(updates) {
                _state = Object.freeze({ ..._state, ...updates });
            }

            /** 从 URL query 获取 atom_id */
            function getAtomIdFromUrl() {
                const params = new URLSearchParams(window.location.search);
                return params.get('atom_id') || '';
            }

            /** 构建 API URL */
            function buildApiUrl(atomId, search, page, formatFilter) {
                const params = new URLSearchParams();
                if (atomId) { params.set('atom_id', atomId); }
                if (search) { params.set('search', search); }
                params.set('page', String(page));
                params.set('limit', String(PAGE_SIZE));
                if (formatFilter && formatFilter !== '全部') {
                    params.set('format', formatFilter.toLowerCase());
                }
                return '/api/images?' + params.toString();
            }

            /** 请求图像列表 */
            async function fetchImages() {
                setState({ loading: true, error: null });
                renderStatus();
                try {
                    const url = buildApiUrl(_state.atomId, _state.search, _state.page, _state.formatFilter);
                    const resp = await fetch(url, { credentials: 'same-origin' });
                    if (!resp.ok) { throw new Error('请求失败: ' + resp.status); }
                    const data = await resp.json();
                    const images = Array.isArray(data.data) ? [...data.data] : [];
                    const total = data.meta ? data.meta.total : images.length;
                    setState({ images, total, loading: false });
                } catch (err) {
                    setState({ images: [], total: 0, loading: false, error: err.message });
                }
                renderGrid();
                renderPagination();
                renderStatus();
            }

            /** 渲染格式筛选标签 */
            function renderFilterTags() {
                const container = document.getElementById('pickerFilterTags');
                if (!container) { return; }
                container.innerHTML = FILTER_OPTIONS.map(function (tag) {
                    const cls = _state.formatFilter === tag ? 'filter-tag active' : 'filter-tag';
                    return '<button class="' + cls + '" onclick="ImagePicker.setFilter(\'' + tag + '\')">' + tag + '</button>';
                }).join('');
            }

            /** 渲染图像网格 */
            function renderGrid() {
                const grid = document.getElementById('pickerImageGrid');
                if (!grid) { return; }
                if (_state.images.length === 0 && !_state.loading) {
                    grid.innerHTML = '';
                    return;
                }
                grid.innerHTML = _state.images.map(function (img) {
                    const isSelected = _state.selectedId === img.id;
                    const cardCls = isSelected ? 'thumb-card selected' : 'thumb-card';
                    const url = img.url || img.thumbnail_url || '';
                    const name = img.filename || img.name || img.id || '';
                    return '<div class="' + cardCls + '" ' +
                        'onclick="ImagePicker.select(\'' + escapeAttr(img.id) + '\')" ' +
                        'ondblclick="ImagePicker.select(\'' + escapeAttr(img.id) + '\');ImagePicker.confirm()">' +
                        '<img class="thumb-preview" src="' + escapeAttr(url) + '" alt="' + escapeAttr(name) + '" loading="lazy" ' +
                        'onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22><rect fill=%22%23f7fafc%22 width=%22120%22 height=%22120%22/><text x=%2260%22 y=%2265%22 text-anchor=%22middle%22 fill=%22%23a0aec0%22 font-size=%2212%22>无预览</text></svg>\'">' +
                        '<div class="thumb-name" title="' + escapeAttr(name) + '">' + escapeHtml(name) + '</div>' +
                        '</div>';
                }).join('');
            }

            /** 渲染分页 */
            function renderPagination() {
                const container = document.getElementById('pickerPagination');
                if (!container) { return; }
                const totalPages = Math.max(1, Math.ceil(_state.total / PAGE_SIZE));
                if (totalPages <= 1) {
                    container.style.display = 'none';
                    return;
                }
                container.style.display = 'flex';
                const prevDisabled = _state.page <= 1 ? ' disabled' : '';
                const nextDisabled = _state.page >= totalPages ? ' disabled' : '';
                container.innerHTML =
                    '<button class="page-btn"' + prevDisabled + ' onclick="ImagePicker.goPage(' + (_state.page - 1) + ')">上一页</button>' +
                    '<span class="page-info">' + _state.page + ' / ' + totalPages + '</span>' +
                    '<button class="page-btn"' + nextDisabled + ' onclick="ImagePicker.goPage(' + (_state.page + 1) + ')">下一页</button>';
            }

            /** 渲染状态提示 */
            function renderStatus() {
                const el = document.getElementById('pickerStatus');
                if (!el) { return; }
                if (_state.loading) {
                    el.style.display = 'block';
                    el.className = 'picker-loading';
                    el.textContent = '加载中...';
                } else if (_state.error) {
                    el.style.display = 'block';
                    el.className = 'picker-error';
                    el.textContent = '加载失败: ' + _state.error;
                } else if (_state.images.length === 0) {
                    el.style.display = 'block';
                    el.className = 'picker-empty';
                    el.textContent = '未找到图像';
                } else {
                    el.style.display = 'none';
                }
            }

            /** 渲染选中信息 */
            function renderSelectedInfo() {
                const el = document.getElementById('pickerSelectedInfo');
                const btn = document.getElementById('pickerConfirmBtn');
                if (!el || !btn) { return; }
                if (_state.selectedId) {
                    const img = _state.images.find(function (i) { return i.id === _state.selectedId; });
                    const name = img ? (img.filename || img.name || img.id) : '';
                    el.textContent = '已选: ' + name;
                    btn.disabled = false;
                } else {
                    el.textContent = '';
                    btn.disabled = true;
                }
            }

            /** 转义 HTML 特殊字符 */
            function escapeHtml(str) {
                const div = document.createElement('div');
                div.appendChild(document.createTextNode(str));
                return div.innerHTML;
            }

            /** 转义 HTML 属性值 */
            function escapeAttr(str) {
                return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            /** 生成 Markdown 图像语法 */
            function generateMarkdown(image) {
                const alt = image.filename || image.name || image.id || 'image';
                const url = image.url || '';
                return '![' + alt + '](' + url + ')';
            }

            /** 打开选择器弹窗 */
            function open(callback, options) {
                const opts = options || {};
                const atomId = opts.atomId || getAtomIdFromUrl() || '';
                setState({
                    ...createInitialState(),
                    isOpen: true,
                    atomId: atomId,
                    callback: typeof callback === 'function' ? callback : null
                });
                const overlay = document.getElementById('imagePickerOverlay');
                if (overlay) { overlay.style.display = 'flex'; }
                const searchInput = document.getElementById('pickerSearchInput');
                if (searchInput) { searchInput.value = ''; searchInput.focus(); }
                renderFilterTags();
                renderSelectedInfo();
                fetchImages();
            }

            /** 关闭选择器弹窗 */
            function close() {
                setState({ ..._state, isOpen: false, selectedId: null });
                const overlay = document.getElementById('imagePickerOverlay');
                if (overlay) { overlay.style.display = 'none'; }
            }

            /** 选中图像 */
            function select(id) {
                setState({ ..._state, selectedId: id });
                renderGrid();
                renderSelectedInfo();
            }

            /** 确认插入 */
            function confirm() {
                if (!_state.selectedId || !_state.callback) { return; }
                const img = _state.images.find(function (i) { return i.id === _state.selectedId; });
                if (!img) { return; }
                const markdown = generateMarkdown(img);
                _state.callback(markdown);
                close();
            }

            /** 搜索图像 */
            function search() {
                const input = document.getElementById('pickerSearchInput');
                const keyword = input ? input.value.trim() : '';
                setState({ ..._state, search: keyword, page: 1, selectedId: null });
                renderSelectedInfo();
                fetchImages();
            }

            /** 设置格式筛选 */
            function setFilter(format) {
                setState({ ..._state, formatFilter: format, page: 1, selectedId: null });
                renderFilterTags();
                renderSelectedInfo();
                fetchImages();
            }

            /** 跳转页码 */
            function goPage(page) {
                const totalPages = Math.max(1, Math.ceil(_state.total / PAGE_SIZE));
                const safePage = Math.max(1, Math.min(page, totalPages));
                if (safePage === _state.page) { return; }
                setState({ ..._state, page: safePage, selectedId: null });
                renderSelectedInfo();
                fetchImages();
            }

            // ESC 键关闭
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && _state.isOpen) { close(); }
            });

            // 点击遮罩关闭
            document.addEventListener('mousedown', function (e) {
                if (_state.isOpen && e.target.id === 'imagePickerOverlay') { close(); }
            });

            return Object.freeze({ open, close, select, confirm, search, setFilter, goPage });
        })();
    </script>
</body>
</html>
