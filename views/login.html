<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - LLM Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/views/css/responsive.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        @media (max-width: 640px) {
            .login-card {
                margin: 16px;
                padding: 24px 16px;
                border-radius: 12px;
            }
        }
        .login-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .login-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-1px);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-8">
            <div class="text-4xl mb-2">📚</div>
            <h1 class="text-2xl font-bold text-gray-800">LLM Wiki</h1>
            <p class="text-gray-500 mt-2">企业知识库管理系统</p>
        </div>

        <form id="loginForm" onsubmit="return doLogin(event)">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">用户名</label>
                <input type="text" id="username" class="login-input" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-medium mb-2">密码</label>
                <input type="password" id="password" class="login-input" placeholder="请输入密码" required>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <button type="submit" id="loginBtn" class="login-btn touch-target">登 录</button>
        </form>

        <!-- SSO 登录区域（由 JS 动态显示） -->
        <div id="ssoSection" style="display:none" class="mt-6">
            <div class="flex items-center my-4">
                <div class="flex-1 h-px bg-gray-300"></div>
                <span class="px-3 text-sm text-gray-500">或使用企业账号</span>
                <div class="flex-1 h-px bg-gray-300"></div>
            </div>
            <div id="ssoProviders" class="flex flex-col sm:flex-row gap-2"></div>
        </div>

        <div class="mt-6 p-3 sm:p-4 bg-blue-50 rounded-lg text-sm text-blue-700">
            <p class="font-medium mb-1">💡 首次使用提示：</p>
            <p class="text-xs sm:text-sm">1. 使用 CLI 创建管理员：<code class="bg-white px-1 rounded text-xs sm:text-sm">llm-wiki user-add &lt;kb&gt; admin --role admin --password xxx</code></p>
            <p class="text-xs sm:text-sm">2. 使用 CLI 启用权限：<code class="bg-white px-1 rounded text-xs sm:text-sm">编辑 .kb-access.json 设置 enabled: true</code></p>
        </div>
    </div>

    <script>
        /**
         * 执行登录
         */
        async function doLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = '登录中...';
            errMsg.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'same-origin',
                });
                const data = await response.json();

                if (response.ok && data.status === 'ok') {
                    // 登录成功，跳转首页
                    window.location.href = '/';
                } else {
                    errMsg.textContent = data.error || '登录失败';
                    errMsg.style.display = 'block';
                }
            } catch (e) {
                errMsg.textContent = '网络错误: ' + e.message;
                errMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
            return false;
        }

        // 如果已登录，直接跳转首页
        fetch('/api/auth/whoami', { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => {
                if (data.user) {
                    window.location.href = '/';
                }
            })
            .catch(() => {});

        // 页面加载后初始化 SSO
        (async function initSSO() {
            // 检查 URL 中的错误参数（SSO 回调失败）
            const params = new URLSearchParams(window.location.search);
            const errorParam = params.get('error');
            if (errorParam) {
                document.getElementById('errorMsg').textContent = decodeURIComponent(errorParam);
                document.getElementById('errorMsg').style.display = 'block';
            }

            // 获取 SSO 提供商列表
            try {
                const response = await fetch('/api/auth/sso/providers', { credentials: 'same-origin' });
                const data = await response.json();
                const providers = data.providers || [];

                if (providers.length > 0) {
                    document.getElementById('ssoSection').style.display = 'block';
                    const container = document.getElementById('ssoProviders');
                    providers.forEach(p => {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium touch-target';
                        btn.textContent = p.display_name || '企业 SSO 登录';
                        btn.onclick = () => window.location.href = p.login_url || '/api/auth/sso/login';
                        container.appendChild(btn);
                    });
                }
            } catch (e) {
                // SSO 不可用，不影响本地登录
            }
        })();
    </script>
</body>
</html>
