<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像库 - LLM Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f7fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-success { background: #38a169; color: white; }
        .btn-success:hover { background: #2f855a; }
        .btn-danger { background: #e53e3e; color: white; }
        .btn-danger:hover { background: #c53030; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        .btn-secondary:hover { background: #cbd5e0; }
        .btn-icon { padding: 6px 10px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: all 0.2s; border: none; background: #e2e8f0; color: #4a5568; }
        .btn-icon:hover { background: #cbd5e0; }
        .btn-icon.active { background: #667eea; color: white; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 50; }
        .modal { background: white; border-radius: 12px; padding: 24px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .input { width: 100%; padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 14px; }
        .input:focus { outline: none; border-color: #667eea; }
        .badge { padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-jpeg { background: #bee3f8; color: #2b6cb0; }
        .badge-png { background: #c6f6d5; color: #276749; }
        .badge-webp { background: #feebc8; color: #c05621; }
        .badge-gif { background: #fed7d7; color: #c53030; }
        .badge-other { background: #e2e8f0; color: #4a5568; }
        .loading { opacity: 0.5; pointer-events: none; }
        .grid-card { background: white; border-radius: 10px; border: 2px solid #e2e8f0; overflow: hidden; transition: all 0.2s; }
        .grid-card:hover { border-color: #667eea; box-shadow: 0 4px 12px rgba(102,126,234,0.15); }
        .grid-card.selected { border-color: #667eea; background: #ebf4ff; }
        .thumb-img { width: 100%; height: 160px; object-fit: cover; cursor: pointer; background: #f7fafc; }
        .list-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; cursor: pointer; background: #f7fafc; }
        .preview-img { max-width: 90vw; max-height: 80vh; object-fit: contain; border-radius: 8px; }
        .checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #667eea; }
        .page-btn { padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; border: 1px solid #e2e8f0; background: white; color: #4a5568; }
        .page-btn:hover { background: #edf2f7; }
        .page-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="text-gray-600 hover:text-gray-800">← 返回首页</a>
                <h1 class="text-xl font-bold text-gray-800">图像库</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showUploadHint()" class="btn btn-success">上传图像</button>
                <span class="text-sm text-gray-600">当前: <strong id="currentUserName">-</strong></span>
                <button onclick="API.logout()" class="btn btn-secondary">退出</button>
            </div>
        </div>
    </header>

    <!-- 工具栏 -->
    <div class="max-w-7xl mx-auto px-6 py-6">
        <div class="card p-4 mb-6">
            <div class="flex flex-wrap items-center gap-3">
                <input type="text" id="searchInput" class="input" style="max-width:280px" placeholder="搜索文件名..." onkeydown="if(event.key==='Enter')loadImages()">
                <select id="formatFilter" onchange="loadImages()" class="input" style="max-width:140px">
                    <option value="">全部格式</option>
                    <option value="jpeg">JPEG</option>
                    <option value="png">PNG</option>
                    <option value="webp">WebP</option>
                    <option value="gif">GIF</option>
                </select>
                <button onclick="loadImages()" class="btn btn-primary">搜索</button>
                <div class="flex-1"></div>
                <div class="flex items-center gap-1">
                    <button onclick="switchView('grid')" id="viewGrid" class="btn-icon active" title="网格视图">&#9638;</button>
                    <button onclick="switchView('list')" id="viewList" class="btn-icon" title="列表视图">&#9776;</button>
                </div>
                <button onclick="toggleSelectAll()" id="selectAllBtn" class="btn btn-secondary text-sm">全选</button>
                <button onclick="batchDelete()" id="batchDeleteBtn" class="btn btn-danger text-sm hidden">删除选中</button>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loadingIndicator" class="text-center py-8 hidden">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full"></div>
            <p class="text-gray-500 mt-2">加载中...</p>
        </div>

        <!-- 网格视图 -->
        <div id="gridView" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>

        <!-- 列表视图 -->
        <div id="listView" class="card overflow-hidden hidden">
            <table class="w-full">
                <thead>
                    <tr class="border-b-2 border-gray-200 text-left text-gray-600">
                        <th class="py-3 px-4 w-10"><input type="checkbox" class="checkbox" onchange="toggleSelectAll(this.checked)"></th>
                        <th class="py-3 px-4">缩略图</th>
                        <th class="py-3 px-4">文件名</th>
                        <th class="py-3 px-4">格式</th>
                        <th class="py-3 px-4">大小</th>
                        <th class="py-3 px-4">上传时间</th>
                        <th class="py-3 px-4">操作</th>
                    </tr>
                </thead>
                <tbody id="listTableBody"></tbody>
            </table>
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-16 hidden">
            <p class="text-gray-400 text-lg">暂无图像</p>
            <p class="text-gray-400 text-sm mt-1">上传图像或调整筛选条件</p>
        </div>

        <!-- 分页 -->
        <div id="pagination" class="flex items-center justify-center gap-2 mt-6 hidden"></div>
    </div>

    <!-- 图像预览弹窗 -->
    <div id="previewModal" class="modal-overlay" onclick="if(event.target===this)closeModal('previewModal')">
        <div class="modal" style="max-width:900px;padding:16px">
            <div class="flex justify-between items-center mb-3">
                <h3 id="previewTitle" class="text-lg font-bold text-gray-800 truncate"></h3>
                <button onclick="closeModal('previewModal')" class="btn btn-secondary text-sm">关闭</button>
            </div>
            <div class="flex justify-center bg-gray-100 rounded-lg p-2">
                <img id="previewImage" class="preview-img" src="" alt="预览">
            </div>
            <div id="previewMeta" class="mt-3 text-sm text-gray-600 space-y-1"></div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal" style="max-width:420px">
            <h3 class="text-lg font-bold mb-2">确认删除</h3>
            <p id="deleteMessage" class="text-gray-600 mb-4"></p>
            <div class="flex gap-2">
                <button onclick="closeModal('deleteModal')" class="btn btn-secondary flex-1">取消</button>
                <button onclick="confirmDelete()" class="btn btn-danger flex-1">删除</button>
            </div>
        </div>
    </div>

    <!-- 上传提示弹窗 -->
    <div id="uploadHintModal" class="modal-overlay">
        <div class="modal" style="max-width:420px">
            <h3 class="text-lg font-bold mb-2">上传图像</h3>
            <p class="text-gray-600 mb-4">请通过 Atom 编辑器上传图像，或在知识库详情页面使用上传功能。图像库页面仅提供浏览和管理能力。</p>
            <button onclick="closeModal('uploadHintModal')" class="btn btn-primary w-full">知道了</button>
        </div>
    </div>

    <script>
        /**
         * API 封装
         */
        const API = {
            currentUser: null,
            async init() {
                try {
                    const r = await fetch('/api/auth/whoami', { credentials: 'same-origin' });
                    const d = await r.json();
                    if (d.user) {
                        this.currentUser = d.user;
                        document.getElementById('currentUserName').textContent = d.user.username;
                        return true;
                    }
                } catch (e) {}
                window.location.href = '/login.html';
                return false;
            },
            async get(url) {
                const r = await fetch(url, { credentials: 'same-origin' });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                if (!r.ok) { throw new Error(`HTTP ${r.status}`); }
                return r.json();
            },
            async delete(url) {
                const r = await fetch(url, { method: 'DELETE', credentials: 'same-origin' });
                if (r.status === 401) { window.location.href = '/login.html'; throw new Error('未登录'); }
                if (!r.ok) { throw new Error(`HTTP ${r.status}`); }
                return r.json();
            },
            async logout() {
                await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).catch(() => {});
                window.location.href = '/login.html';
            }
        };

        /* ---- 状态 ---- */
        let currentView = 'grid';
        let selectedIds = [];
        let currentPage = 1;
        let totalPages = 1;
        const PAGE_SIZE = 20;
        let pendingDeleteIds = [];

        /**
         * 从 URL 获取 atom_id 参数
         */
        function getAtomId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('atom_id') || '';
        }

        /**
         * 初始化
         */
        async function init() {
            const ok = await API.init();
            if (!ok) return;
            await loadImages();
        }

        /**
         * 构建查询 URL
         */
        function buildQueryUrl(page) {
            const atomId = getAtomId();
            const search = document.getElementById('searchInput').value.trim();
            const format = document.getElementById('formatFilter').value;

            const params = new URLSearchParams();
            params.set('page', String(page));
            params.set('limit', String(PAGE_SIZE));
            if (atomId) params.set('atom_id', atomId);
            if (search) params.set('search', search);
            if (format) params.set('format', format);

            return `/api/images?${params.toString()}`;
        }

        /**
         * 加载图像列表
         */
        async function loadImages() {
            const loading = document.getElementById('loadingIndicator');
            const gridView = document.getElementById('gridView');
            const listView = document.getElementById('listView');
            const emptyState = document.getElementById('emptyState');
            const pagination = document.getElementById('pagination');

            loading.classList.remove('hidden');
            gridView.innerHTML = '';
            document.getElementById('listTableBody').innerHTML = '';
            emptyState.classList.add('hidden');
            pagination.classList.add('hidden');
            selectedIds = [];
            updateBatchUI();

            try {
                const url = buildQueryUrl(currentPage);
                const data = await API.get(url);
                const images = data.images || data.items || [];
                const total = data.total || 0;
                totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));

                if (images.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                if (currentView === 'grid') {
                    renderGridView(images);
                    gridView.classList.remove('hidden');
                    listView.classList.add('hidden');
                } else {
                    renderListView(images);
                    listView.classList.remove('hidden');
                    gridView.classList.add('hidden');
                }

                renderPagination();
            } catch (e) {
                emptyState.classList.remove('hidden');
                emptyState.innerHTML = `<p class="text-red-500">加载失败: ${escapeHtml(e.message)}</p>`;
            } finally {
                loading.classList.add('hidden');
            }
        }

        /**
         * 渲染网格视图
         */
        function renderGridView(images) {
            const container = document.getElementById('gridView');
            const html = images.map(img => {
                const isSelected = selectedIds.includes(img.id);
                const thumbUrl = img.thumbnail_url || img.url || '';
                const badge = getFormatBadge(img.format || img.content_type || '');
                return `
                    <div class="grid-card ${isSelected ? 'selected' : ''}" id="card-${img.id}">
                        <div class="relative">
                            <img src="${escapeHtml(thumbUrl)}" class="thumb-img" alt="${escapeHtml(img.filename || img.name || '')}" onclick="previewImage(${img.id})" loading="lazy">
                            <div class="absolute top-2 left-2">
                                <input type="checkbox" class="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${img.id}, this.checked)">
                            </div>
                        </div>
                        <div class="p-3">
                            <p class="text-sm font-medium text-gray-800 truncate" title="${escapeHtml(img.filename || img.name || '')}">${escapeHtml(img.filename || img.name || '未命名')}</p>
                            <div class="flex items-center justify-between mt-1">
                                ${badge}
                                <span class="text-xs text-gray-500">${formatSize(img.size || 0)}</span>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            container.innerHTML = html;
        }

        /**
         * 渲染列表视图
         */
        function renderListView(images) {
            const tbody = document.getElementById('listTableBody');
            const html = images.map(img => {
                const isSelected = selectedIds.includes(img.id);
                const thumbUrl = img.thumbnail_url || img.url || '';
                const badge = getFormatBadge(img.format || img.content_type || '');
                const createdAt = (img.created_at || img.uploaded_at || '').slice(0, 10);
                return `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 ${isSelected ? 'bg-blue-50' : ''}">
                        <td class="py-3 px-4"><input type="checkbox" class="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${img.id}, this.checked)"></td>
                        <td class="py-3 px-4"><img src="${escapeHtml(thumbUrl)}" class="list-thumb" alt="" onclick="previewImage(${img.id})" loading="lazy"></td>
                        <td class="py-3 px-4 font-medium text-sm">${escapeHtml(img.filename || img.name || '未命名')}</td>
                        <td class="py-3 px-4">${badge}</td>
                        <td class="py-3 px-4 text-sm text-gray-600">${formatSize(img.size || 0)}</td>
                        <td class="py-3 px-4 text-sm text-gray-500">${createdAt}</td>
                        <td class="py-3 px-4">
                            <button onclick="previewImage(${img.id})" class="btn btn-secondary text-xs mr-1">预览</button>
                            <button onclick="deleteSingle(${img.id}, '${escapeHtml(img.filename || img.name || '')}')" class="btn btn-danger text-xs">删除</button>
                        </td>
                    </tr>`;
            }).join('');
            tbody.innerHTML = html;
        }

        /**
         * 渲染分页
         */
        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.classList.add('hidden'); return; }

            container.classList.remove('hidden');
            const pages = buildPageNumbers(currentPage, totalPages);
            const html = pages.map(p => {
                if (p === '...') return '<span class="text-gray-400 px-1">...</span>';
                const cls = p === currentPage ? 'page-btn active' : 'page-btn';
                return `<button class="${cls}" onclick="goToPage(${p})">${p}</button>`;
            }).join('');

            container.innerHTML = `
                <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>
                ${html}
                <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
        }

        /**
         * 构建页码数组
         */
        function buildPageNumbers(current, total) {
            if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
            const pages = [];
            pages.push(1);
            if (current > 3) pages.push('...');
            const start = Math.max(2, current - 1);
            const end = Math.min(total - 1, current + 1);
            for (let i = start; i <= end; i++) pages.push(i);
            if (current < total - 2) pages.push('...');
            pages.push(total);
            return pages;
        }

        /**
         * 跳转页码
         */
        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadImages();
        }

        /**
         * 切换视图
         */
        function switchView(view) {
            currentView = view;
            document.getElementById('viewGrid').classList.toggle('active', view === 'grid');
            document.getElementById('viewList').classList.toggle('active', view === 'list');
            loadImages();
        }

        /**
         * 切换单个选中
         */
        function toggleSelect(id, checked) {
            if (checked) {
                selectedIds = [...selectedIds, id];
            } else {
                selectedIds = selectedIds.filter(sid => sid !== id);
            }
            updateBatchUI();
            updateCardHighlight(id, checked);
        }

        /**
         * 全选/取消全选
         */
        function toggleSelectAll(checked) {
            if (typeof checked === 'undefined') {
                checked = selectedIds.length === 0;
            }
            const checkboxes = document.querySelectorAll('.checkbox:not([onchange*="toggleSelectAll"])');
            if (checked) {
                checkboxes.forEach(cb => { cb.checked = true; });
                selectedIds = collectAllImageIds();
            } else {
                checkboxes.forEach(cb => { cb.checked = false; });
                selectedIds = [];
            }
            updateBatchUI();
        }

        /**
         * 收集所有图像 ID
         */
        function collectAllImageIds() {
            const checkboxes = document.querySelectorAll('.checkbox:not([onchange*="toggleSelectAll"])');
            return Array.from(checkboxes).map(cb => {
                const onchange = cb.getAttribute('onchange') || '';
                const match = onchange.match(/toggleSelect\((\d+)/);
                return match ? parseInt(match[1]) : null;
            }).filter(id => id !== null);
        }

        /**
         * 更新批量操作 UI
         */
        function updateBatchUI() {
            const btn = document.getElementById('batchDeleteBtn');
            const count = selectedIds.length;
            if (count > 0) {
                btn.classList.remove('hidden');
                btn.textContent = `删除选中 (${count})`;
            } else {
                btn.classList.add('hidden');
            }
        }

        /**
         * 更新卡片高亮状态
         */
        function updateCardHighlight(id, checked) {
            const card = document.getElementById(`card-${id}`);
            if (!card) return;
            card.classList.toggle('selected', checked);
        }

        /**
         * 预览图像
         */
        function previewImage(id) {
            const url = buildQueryUrl(currentPage);
            API.get(url).then(data => {
                const images = data.images || data.items || [];
                const img = images.find(i => i.id === id);
                if (!img) return;
                const src = img.url || img.thumbnail_url || '';
                const name = img.filename || img.name || '未命名';
                document.getElementById('previewTitle').textContent = name;
                document.getElementById('previewImage').src = src;
                document.getElementById('previewMeta').innerHTML = `
                    <p>格式: ${img.format || img.content_type || '-'}</p>
                    <p>大小: ${formatSize(img.size || 0)}</p>
                    <p>上传时间: ${(img.created_at || img.uploaded_at || '-').slice(0, 19).replace('T', ' ')}</p>
                    ${img.width ? `<p>尺寸: ${img.width} x ${img.height}</p>` : ''}`;
                document.getElementById('previewModal').style.display = 'flex';
            }).catch(() => {
                alert('无法加载图像信息');
            });
        }

        /**
         * 删除单个图像
         */
        function deleteSingle(id, name) {
            pendingDeleteIds = [id];
            document.getElementById('deleteMessage').textContent = `确定删除图像 "${name}"？此操作不可恢复。`;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        /**
         * 批量删除
         */
        function batchDelete() {
            if (selectedIds.length === 0) return;
            pendingDeleteIds = [...selectedIds];
            document.getElementById('deleteMessage').textContent = `确定删除选中的 ${selectedIds.length} 张图像？此操作不可恢复。`;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        /**
         * 确认删除
         */
        async function confirmDelete() {
            const ids = [...pendingDeleteIds];
            closeModal('deleteModal');

            let failCount = 0;
            for (const id of ids) {
                try {
                    await API.delete(`/api/images/${id}`);
                } catch (e) {
                    failCount++;
                }
            }

            if (failCount > 0) {
                alert(`${ids.length - failCount} 张已删除，${failCount} 张删除失败`);
            } else {
                alert(`已删除 ${ids.length} 张图像`);
            }

            pendingDeleteIds = [];
            selectedIds = [];
            updateBatchUI();
            await loadImages();
        }

        /**
         * 上传提示
         */
        function showUploadHint() {
            document.getElementById('uploadHintModal').style.display = 'flex';
        }

        /**
         * 关闭弹窗
         */
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        /**
         * 获取格式徽章
         */
        function getFormatBadge(format) {
            const normalized = (format || '').toLowerCase().replace('image/', '');
            const badgeClass = {
                'jpeg': 'badge-jpeg', 'jpg': 'badge-jpeg',
                'png': 'badge-png',
                'webp': 'badge-webp',
                'gif': 'badge-gif'
            }[normalized] || 'badge-other';
            const label = normalized || '未知';
            return `<span class="badge ${badgeClass}">${escapeHtml(label.toUpperCase())}</span>`;
        }

        /**
         * 格式化文件大小
         */
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            const size = (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0);
            return `${size} ${units[i]}`;
        }

        /**
         * HTML 转义
         */
        function escapeHtml(str) {
            if (str == null) return '';
            return String(str).replace(/[&<>"']/g, m => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[m]));
        }

        // 启动
        init();
    </script>
</body>
</html>
